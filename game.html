<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Ankita</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #f6e5e9, #ffc3a0);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            padding: 20px;
            position: relative;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.75);
            padding: 40px 24px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(255, 154, 158, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 420px;
            width: 100%;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 3D Heart Styles */
        .heart-container {
            perspective: 1000px;
            margin-top: 10px;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        .heart-wrapper {
            transform-style: preserve-3d;
            animation: float-spin 5s ease-in-out infinite;
            position: relative;
        }

        .heart-3d {
            position: relative;
            width: 80px;
            height: 80px;
            background: #ff4b72;
            transform: rotate(-45deg);
            box-shadow: -10px 10px 30px rgba(255, 75, 114, 0.5);
            border-bottom-left-radius: 5px;
        }

        .heart-3d::before,
        .heart-3d::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: #ff4b72;
            border-radius: 50%;
        }

        .heart-3d::before {
            top: -40px;
            left: 0;
        }

        .heart-3d::after {
            left: 40px;
            top: 0;
        }

        @keyframes float-spin {
            0% {
                transform: translateY(0) rotateY(0deg) scale(1);
            }

            25% {
                transform: translateY(-10px) rotateY(90deg) scale(1.05);
            }

            50% {
                transform: translateY(0) rotateY(180deg) scale(1);
            }

            75% {
                transform: translateY(10px) rotateY(270deg) scale(0.95);
            }

            100% {
                transform: translateY(0) rotateY(360deg) scale(1);
            }
        }

        @keyframes rapid-beat {

            0%,
            100% {
                transform: scale(1) rotateY(0deg);
            }

            20% {
                transform: scale(1.2) rotateY(0deg);
            }

            40% {
                transform: scale(1) rotateY(0deg);
            }

            60% {
                transform: scale(1.2) rotateY(0deg);
            }

            80% {
                transform: scale(1) rotateY(0deg);
            }
        }

        h1 {
            color: #ff4b72;
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 32px;
            line-height: 1.4;
            text-shadow: 0 2px 4px rgba(255, 75, 114, 0.1);
        }

        .poem {
            font-size: 20px;
            color: #ff4b72;
            font-weight: 600;
            line-height: 1.5;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            position: relative;
            min-height: 56px;
        }

        .btn {
            padding: 14px 24px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            outline: none;
            white-space: nowrap;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff4b72, #ff758c);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 75, 114, 0.3);
            flex: 1;
            max-width: 160px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        .btn-no {
            background-color: #ffffff;
            color: #ff4b72;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            flex: 1;
            max-width: 160px;
            transition: top 0.4s cubic-bezier(0.25, 1, 0.5, 1),
                left 0.4s cubic-bezier(0.25, 1, 0.5, 1),
                transform 0.4s ease;
        }

        .success-message {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-poem {
            color: #ff4b72;
            font-size: 24px;
            font-weight: 800;
            margin-top: 16px;
            line-height: 1.4;
        }

        .heart {
            position: fixed;
            font-size: 32px;
            color: #ff4b72;
            animation: float 4s ease-in infinite;
            opacity: 0;
            z-index: 999;
            pointer-events: none;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0) rotate(-20deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) scale(1.5) rotate(20deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="main-container">

        <div class="heart-container" id="heart-container">
            <div class="heart-wrapper" id="heart-wrapper">
                <div class="heart-3d"></div>
            </div>
        </div>

        <h1 id="question">
            Roses are red,
            The sky is so blue,
            Ankita, my dear,
            Can I be friend with you?
        </h1>

        <div class="btn-group" id="btn-group">
            <button class="btn btn-yes" id="yes-btn">Yes, Why Not!</button>
            <button class="btn btn-no" id="no-btn">Never!</button>
        </div>

        <div class="success-message" id="success-message">
            <h2 class="success-poem">
                Yay! You said Yes,<br>
                My heart's in a spin,
                A beautiful friendship
                Is about to begin! ❤️
            </h2>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const mainContainer = document.getElementById('main-container');
        const question = document.getElementById('question');
        const btnGroup = document.getElementById('btn-group');
        const successMessage = document.getElementById('success-message');
        const heartWrapper = document.getElementById('heart-wrapper');

        let isMovedOut = false;

        const moveButton = () => {
            if (!isMovedOut) {
                const rect = noBtn.getBoundingClientRect();

                noBtn.style.position = 'fixed';
                noBtn.style.left = rect.left + 'px';
                noBtn.style.top = rect.top + 'px';
                noBtn.style.width = rect.width + 'px';
                noBtn.style.height = rect.height + 'px';
                noBtn.style.maxWidth = 'none';
                noBtn.style.flex = 'none';

                document.body.appendChild(noBtn);

                noBtn.offsetHeight;

                isMovedOut = true;
            }

            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            const safePadding = 20;

            const maxLeft = window.innerWidth - btnWidth - safePadding;
            const maxTop = window.innerHeight - btnHeight - safePadding;

            const randomX = Math.max(safePadding, Math.min(Math.floor(Math.random() * maxLeft), maxLeft));
            const randomY = Math.max(safePadding, Math.min(Math.floor(Math.random() * maxTop), maxTop));

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.zIndex = '1000';

            const randomRotation = Math.floor(Math.random() * 30) - 15;
            noBtn.style.transform = `rotate(${randomRotation}deg)`;
        };

        noBtn.addEventListener('mouseover', moveButton);

        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        }, { passive: false });

        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveButton();
        });

        yesBtn.addEventListener('click', () => {
            question.style.display = 'none';
            btnGroup.style.display = 'none';

            noBtn.style.display = 'none';

            successMessage.style.display = 'flex';

            // Change the 3D heart animation to a rapid heartbeat on success
            heartWrapper.style.animation = 'rapid-beat 1.5s ease-in-out infinite';
            mainContainer.style.transform = 'scale(1.05)';

            createHearts();
        });

        function createHearts() {
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = '❤️';
                    heart.classList.add('heart');

                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 2 + 2.5) + 's';

                    document.body.appendChild(heart);

                    setTimeout(() => {
                        heart.remove();
                    }, 5000);
                }, i * 80);
            }
        }
    </script>
</body>

</html>
